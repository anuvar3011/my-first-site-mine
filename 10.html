<html>
<head>
<title>Анкета — Minecraft опрос</title>
</head>
<body bgcolor="#2E5A1E" text="white">

<table width="100%" cellpadding="10">
    <tr>
        <td align="center">
            <font size="6" color="#FFD700"><b>📋 АНКЕТА</b></font>
            <font size="3" color="#B8860B"><br>Опрос для игроков Minecraft</font>
            <hr width="50%" color="#B8860B">
        </td>
    </tr>
    <tr>
        <td bgcolor="#4A3A2A" style="border-radius: 15px; padding: 20px;">
            
            <form>
            
            <font color="white">
            
            <!-- Текстовые поля -->
            <b><font color="#FFD700">🎮 Ваш игровой ник:</font></b><br>
            <input type="text" name="nick" size="40" style="background-color: #6A5A4A; color: white; border: 1px solid #B8860B;"><br><br>
            
            <b><font color="#FFD700">📧 E-mail:</font></b><br>
            <input type="text" name="email" size="40" style="background-color: #6A5A4A; color: white; border: 1px solid #B8860B;"><br><br>
            
            <b><font color="#FFD700">🔒 Пароль:</font></b><br>
            <input type="password" name="pass" size="40" style="background-color: #6A5A4A; color: white; border: 1px solid #B8860B;"><br><br>
            
            <hr color="#B8860B">
            
            <!-- Выпадающий список -->
            <b><font color="#FFD700">🌍 Ваш любимый биом:</font></b><br>
            <select name="biome" style="background-color: #6A5A4A; color: white; border: 1px solid #B8860B;">
                <option selected>Равнины</option>
                <option>Тёмный лес</option>
                <option>Пустыня</option>
                <option>Горы</option>
                <option>Болото</option>
                <option>Вишнёвая роща</option>
                <option>Край (The End)</option>
            </select><br><br>
            
            <hr color="#B8860B">
            
            <!-- Переключатели (radio) -->
            <b><font color="#FFD700">⚔️ Ваша любимая роль в игре:</font></b><br>
            <input type="radio" name="role" value="builder"> Строитель<br>
            <input type="radio" name="role" value="fighter"> Боец<br>
            <input type="radio" name="role" value="explorer"> Исследователь<br>
            <input type="radio" name="role" value="redstone"> Инженер редстоуна<br>
            
            <hr color="#B8860B">
            
            <!-- Флажки (checkbox) -->
            <b><font color="#FFD700">🧱 Какие версии вы играли?</font></b><br>
            <input type="checkbox" name="version" value="java"> Java Edition<br>
            <input type="checkbox" name="version" value="bedrock"> Bedrock Edition<br>
            <input type="checkbox" name="version" value="console"> Legacy Console<br>
            
            <hr color="#B8860B">
            
            <!-- Многострочное поле -->
            <b><font color="#FFD700">📝 Ваши пожелания / впечатления об игре:</font></b><br>
            <textarea name="message" rows="5" cols="50" style="background-color: #6A5A4A; color: white; border: 1px solid #B8860B;"></textarea><br><br>
            
            <hr color="#B8860B">
            
            <!-- Кнопки -->
            <input type="reset" value="❌ Очистить форму" style="background-color: #8B5A2B; color: white; border: none; padding: 8px 15px;">
            <input type="submit" value="✅ Отправить" style="background-color: #FFD700; color: black; border: none; padding: 8px 15px;">
            
            </font>
            
            </form>
            
        </td>
    </tr>
    <tr>

        </td>
    </tr>
</table>

</body>
</html>
