<h2 align="center">Крипер</h2>
<p><b>Крипер</b> — символ Minecraft. Он появился из-за ошибки в коде: Notch пытался создать свинью, но перепутал высоту и ширину модели. Так родился зелёный взрывающийся монстр.</p>
